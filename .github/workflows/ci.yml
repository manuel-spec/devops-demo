name: DevOps CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Source Code
        uses: actions/checkout@v4

      - name: 2. Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 3. Install Dependencies (The 'Build' Phase)
        run: npm install

      - name: 4. Build Project
        run: npm run build

      - name: 5. Automated Tests (The 'Test' Phase)
        run: |
          echo "Running automated unit tests..."
          # In a real project, you would run: npm test
          echo "All tests passed successfully!"
